<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="AI Robinhood Agent - deterministic, risk-governed multi-agent trading engine for US equities">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="0.55" stop-color="#0e1b2e"/>
      <stop offset="1" stop-color="#0c2233"/>
    </linearGradient>
    <linearGradient id="gain" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#16c784" stop-opacity="0"/>
      <stop offset="1" stop-color="#16c784" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8bd6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#16c784" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#16c784" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1b2c41" stroke-width="1" opacity="0.55">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="230" x2="1280" y2="230"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
    <line x1="1120" y1="0" x2="1120" y2="360"/>
  </g>

  <!-- chart area + trend line -->
  <path d="M0,360 L0,318 120,306 240,320 360,288 480,298 600,262 720,278 840,236 960,250 1080,210 1200,224 1280,188 L1280,360 Z" fill="url(#gain)"/>
  <polyline points="0,318 120,306 240,320 360,288 480,298 600,262 720,278 840,236 960,250 1080,210 1200,224 1280,188"
            fill="none" stroke="#16c784" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
  <circle cx="1280" cy="188" r="26" fill="url(#glow)"/>
  <circle cx="1280" cy="188" r="5" fill="#16c784"/>

  <!-- eyebrow -->
  <text x="82" y="92" font-family="Consolas, 'SFMono-Regular', Menlo, monospace" font-size="15"
        letter-spacing="4" fill="#5fa8d3">AI ROBINHOOD AGENT &#8226; US EQUITIES &#8226; MCP-GATED</text>

  <!-- title -->
  <text x="80" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62"
        font-weight="700" fill="url(#title)">Quill</text>

  <!-- tagline -->
  <text x="82" y="202" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23"
        fill="#9fb3c8">Deterministic, risk-governed multi-agent trading engine for US equities</text>

  <!-- feature pills -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16">
    <rect x="82" y="238" rx="16" ry="16" width="150" height="36" fill="#102536" stroke="#1f3b52"/>
    <text x="157" y="262" text-anchor="middle" fill="#b9e8d4">Deterministic</text>

    <rect x="246" y="238" rx="16" ry="16" width="206" height="36" fill="#102536" stroke="#1f3b52"/>
    <text x="349" y="262" text-anchor="middle" fill="#cfe3ff">Risk-guardian veto</text>

    <rect x="466" y="238" rx="16" ry="16" width="206" height="36" fill="#102536" stroke="#1f3b52"/>
    <text x="569" y="262" text-anchor="middle" fill="#cfe3ff">Paper-mode default</text>
  </g>
</svg>
